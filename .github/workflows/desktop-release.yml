name: Desktop Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-mac-arm64:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Package (macOS arm64)
        run: pnpm exec electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac-x64:
    name: Build macOS (Intel)
    runs-on: macos-13
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Package (macOS x64)
        run: pnpm exec electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: Build Windows
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Package (Windows)
        run: pnpm exec electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-aliases:
    name: Publish stable-name aliases
    needs: [build-mac-arm64, build-mac-x64, build-win]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      - name: Download and re-upload with stable names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release download "$TAG" --pattern "*.dmg" --pattern "*.exe" --dir ./artifacts
          ls artifacts/
          # Rename to stable names
          for f in artifacts/*arm64*.dmg; do cp "$f" artifacts/Nomi-mac-arm64.dmg 2>/dev/null || true; done
          for f in artifacts/*x64*.dmg; do cp "$f" artifacts/Nomi-mac-intel.dmg 2>/dev/null || true; done
          for f in artifacts/*.exe; do cp "$f" artifacts/Nomi-windows-setup.exe 2>/dev/null || true; done
          # Upload stable-name aliases
          gh release upload "$TAG" artifacts/Nomi-mac-arm64.dmg --clobber 2>/dev/null || true
          gh release upload "$TAG" artifacts/Nomi-mac-intel.dmg --clobber 2>/dev/null || true
          gh release upload "$TAG" artifacts/Nomi-windows-setup.exe --clobber 2>/dev/null || true
